<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS BLITZ IP TV</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Video Player Engines -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --amoled-black: #000000;
            --surface-dark: #0a0a0a;
            --surface-card: #121212;
            --surface-glass: rgba(18, 18, 18, 0.7);
            --accent-primary: #ff0055;
            --accent-hover: #ff3377;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #222222;
            --focus-ring: rgba(255, 0, 85, 0.5);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Base Configuration & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--amoled-black);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        input, button {
            font-family: inherit;
        }

        /* Shell Architecture */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 70px 1fr;
            grid-template-areas: 
                "sidebar topbar"
                "sidebar main";
            height: 100vh;
            width: 100vw;
        }

        /* Top Navigation Header */
        .topbar {
            grid-area: topbar;
            background-color: var(--surface-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        .brand-mobile {
            display: none;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .brand-mobile span {
            color: var(--accent-primary);
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-container i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            background-color: var(--surface-card);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem 0.6rem 2.8rem;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        /* Sidebar Navigation Component */
        .sidebar {
            grid-area: sidebar;
            background-color: var(--surface-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 11;
        }

        .brand {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
        }

        .brand span {
            color: var(--accent-primary);
        }

        .nav-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 2rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition-smooth);
            font-weight: 500;
            gap: 1rem;
        }

        .nav-item:hover, .nav-item.active, .nav-item:focus {
            background-color: var(--surface-card);
            color: var(--text-main);
            outline: none;
        }

        .nav-item.active {
            border-left: 3px solid var(--accent-primary);
            border-radius: 0 8px 8px 0;
            padding-left: calc(1rem - 3px);
        }

        /* Main Screen Layout */
        .main-content {
            grid-area: main;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            scroll-behavior: smooth;
        }

        /* Premium Unified Hybrid Player Interface */
        .player-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .player-viewport.theater {
            position: fixed;
            top: 70px;
            left: 260px;
            width: calc(100vw - 260px);
            height: calc(60vh);
            z-index: 9;
            border-radius: 0;
        }

        .video-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .youtube-canvas {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* Custom Dynamic Player UI Overlays */
        .player-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        .player-viewport:hover .player-ui-layer,
        .player-viewport:focus-within .player-ui-layer {
            opacity: 1;
        }

        .player-top-shelf {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-live-indicator {
            background-color: var(--accent-primary);
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .player-live-indicator::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .player-controls-shelf {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .player-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .player-btn:hover, .player-btn:focus {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--accent-primary);
            outline: none;
        }

        .volume-slider-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .volume-slider {
            width: 80px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        /* Error, Loading and Empty Infrastructure Screen states */
        .player-state-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            z-index: 1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 1s ease-in-out infinite;
        }

        .state-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .state-retry-btn {
            background-color: var(--accent-primary);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .state-retry-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Infinite Grid System Matrix */
        .content-grid-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-header {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        /* OTT Style Channel Card Blueprint */
        .channel-card {
            background-color: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .channel-card:hover, .channel-card:focus {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 20px rgba(255, 0, 85, 0.1);
            outline: none;
        }

        .card-thumb-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .channel-card:hover .card-thumb {
            transform: scale(1.05);
        }

        .card-badge-live {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background-color: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .card-badge-live.online::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #00ff66;
            border-radius: 50%;
            display: inline-block;
        }

        .card-badge-live.offline::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
        }

        .card-action-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background-color: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            z-index: 3;
        }

        .card-action-btn:hover {
            background-color: var(--accent-primary);
            transform: scale(1.1);
        }

        .card-action-btn.is-favorite {
            color: var(--accent-primary);
            background-color: rgba(0, 0, 0, 0.8);
        }

        .card-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-category {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .recent-indicator {
            color: var(--accent-primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        /* Empty State Data Screen Layout */
        .empty-registry-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            text-align: center;
            background-color: var(--surface-card);
            border: 1px dashed var(--border-color);
            border-radius: 16px;
            grid-column: 1 / -1;
        }

        .empty-registry-state i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .empty-registry-state h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-registry-state p {
            color: var(--text-muted);
            max-width: 400px;
            font-size: 0.95rem;
        }

        /* Modern Mobile Navigation Bar Overlay */
        .mobile-nav-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            background-color: var(--surface-dark);
            border-top: 1px solid var(--border-color);
            grid-template-columns: repeat(4, 1fr);
            z-index: 99;
            padding: 0.5rem 0;
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-decoration: none;
            cursor: pointer;
        }

        .mobile-nav-item.active {
            color: var(--accent-primary);
        }

        .mobile-nav-item i {
            font-size: 1.2rem;
        }

        /* Animations */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Responsive Architecture Engine Adaptive Breakpoints */
        @media(max-width: 1024px) {
            .app-container {
                grid-template-columns: 200px 1fr;
            }
            .player-viewport.theater {
                left: 200px;
                width: calc(100vw - 200px);
            }
        }

        @media(max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "topbar"
                    "main";
            }
            .sidebar {
                display: none;
            }
            .topbar {
                padding: 0 1rem;
            }
            .brand-mobile {
                display: block;
            }
            .search-container {
                width: 180px;
            }
            .main-content {
                padding: 1rem;
                padding-bottom: 80px;
            }
            .mobile-nav-bar {
                display: grid;
            }
            .player-viewport.theater {
                left: 0;
                width: 100vw;
                top: 70px;
            }
        }

        /* Smart TV Media Query Layout Variant Rules */
        @media (min-width: 1921px) {
            :root {
                font-size: 18px;
            }
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Header Viewport Layer -->
        <header class="topbar">
            <div class="brand-mobile">MS <span>BLITZ</span></div>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="search-input" id="searchChannels" placeholder="Search operational channels..." autocomplete="off">
            </div>
        </header>

        <!-- Sidebar Layout Component -->
        <aside class="sidebar">
            <div class="brand">MS <span>BLITZ TV</span></div>
            
            <nav>
                <div class="nav-section-title">Discover</div>
                <ul class="nav-list" id="primaryNav">
                    <li class="nav-item active" data-target="all" tabindex="0"><i class="fa-solid fa-tv"></i> All Channels</li>
                    <li class="nav-item" data-target="favorites" tabindex="0"><i class="fa-solid fa-heart"></i> Favorites</li>
                    <li class="nav-item" data-target="recents" tabindex="0"><i class="fa-solid fa-clock-rotate-left"></i> Recents</li>
                </ul>

                <div class="nav-section-title">Categories</div>
                <ul class="nav-list" id="categoriesNav">
                    <li class="nav-item" data-category="Sports" tabindex="0"><i class="fa-solid fa-trophy"></i> Sports</li>
                    <li class="nav-item" data-category="News" tabindex="0"><i class="fa-solid fa-newspaper"></i> News</li>
                    <li class="nav-item" data-category="Movies" tabindex="0"><i class="fa-solid fa-film"></i> Movies</li>
                    <li class="nav-item" data-category="Kids" tabindex="0"><i class="fa-solid fa-child"></i> Kids</li>
                    <li class="nav-item" data-category="Music" tabindex="0"><i class="fa-solid fa-music"></i> Music</li>
                    <li class="nav-item" data-category="Religious" tabindex="0"><i class="fa-solid fa-mosque"></i> Religious</li>
                    <li class="nav-item" data-category="Custom" tabindex="0"><i class="fa-solid fa-sliders"></i> Custom</li>
                </ul>
            </nav>
        </aside>

        <!-- Main Screen Space -->
        <main class="main-content">
            
            <!-- Unified Hybrid Structural Video Player -->
            <section class="player-viewport" id="playerViewport" aria-label="IPTV Live Video Player Engine">
                
                <!-- HLS Engine Canvas -->
                <video id="hlsCanvas" class="video-canvas" playsinline standard-muted="false"></video>
                
                <!-- YouTube Container Sandbox -->
                <div id="ytCanvas" class="youtube-canvas"></div>

                <!-- Structural State Layer Overlays -->
                <div class="player-state-overlay" id="playerStateOverlay" style="display: none;">
                    <div class="spinner" id="playerSpinner"></div>
                    <div class="state-message" id="playerStateMessage">Engine Offline</div>
                    <button class="state-retry-btn" id="playerRetryBtn" style="display: none;">Retry Stream</button>
                </div>

                <!-- Custom Overlay Interface Controls -->
                <div class="player-ui-layer" id="playerUiLayer">
                    <div class="player-top-shelf">
                        <div class="player-live-indicator" id="playerLiveIndicator">LIVE</div>
                        <div class="player-meta-title" id="playerCurrentTitle" style="font-weight:600; text-shadow: 0 2px 4px rgba(0,0,0,0.8);"></div>
                    </div>

                    <div class="player-controls-shelf">
                        <div class="control-group">
                            <button class="player-btn" id="btnPlayPause" title="Play/Pause"><i class="fa-solid fa-pause"></i></button>
                            <button class="player-btn" id="btnMute" title="Mute/Unmute"><i class="fa-solid fa-volume-high"></i></button>
                            <div class="volume-slider-container">
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                            </div>
                        </div>

                        <div class="control-group">
                            <button class="player-btn" id="btnRetryEngine" title="Rebuild Player Engine"><i class="fa-solid fa-arrows-rotate"></i></button>
                            <button class="player-btn" id="btnTheater" title="Theater Mode"><i class="fa-solid fa-rectangle-ad"></i></button>
                            <button class="player-btn" id="btnPip" title="Picture-in-Picture"><i class="fa-solid fa-window-restore"></i></button>
                            <button class="player-btn" id="btnFullscreen" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Dynamic Channels Grid Workspace -->
            <section class="content-grid-section">
                <div class="section-header">
                    <span id="sectionTitleDisplay">All Channels</span>
                </div>
                <div class="channels-grid" id="channelsGridSystem">
                    <!-- Real-Data configuration elements injected programmatically only -->
                </div>
            </section>

        </main>

        <!-- Responsive Mobile Architecture Navigation Bar Component Layer -->
        <div class="mobile-nav-bar">
            <div class="mobile-nav-item active" data-target="all"><i class="fa-solid fa-tv"></i><span>All</span></div>
            <div class="mobile-nav-item" data-target="favorites"><i class="fa-solid fa-heart"></i><span>Favs</span></div>
            <div class="mobile-nav-item" data-target="recents"><i class="fa-solid fa-clock-rotate-left"></i><span>Recent</span></div>
            <div class="mobile-nav-item" id="mobileSearchTrigger"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></div>
        </div>

    </div>

    <!-- Application Engine Implementation -->
    <script>
        /**
         * MS BLITZ IP TV Core Configuration & Registry System Architecture
         * Pure Functional Vanilla Framework Engine
         */

        // Secured Internal Core Config
        const SYSTEM_CONFIG = {
            tgAdminId: "7063296012",
            tgBotToken: "8472009564:AAGlifLpqK6BOr18kDMwUxX9AEJZ7xwkDBk",
            storageKey: "ms_blitz_channels_reg",
            favsKey: "ms_blitz_favs",
            recentsKey: "ms_blitz_recents"
        };

        // UI Core App State
        let channelRegistry = [];
        let favoriteRegistry = JSON.parse(localStorage.getItem(SYSTEM_CONFIG.favsKey)) || [];
        let recentRegistry = JSON.parse(localStorage.getItem(SYSTEM_CONFIG.recentsKey)) || [];
        
        let currentFilter = 'all'; // all, favorites, recents, or category name
        let searchQuery = '';

        // Player Instance Pointers
        let hlsEngine = null;
        let ytPlayer = null;
        let ytApiReady = false;
        let activeChannel = null;
        let uiTimeout = null;

        // Core DOM References
        const hlsCanvas = document.getElementById('hlsCanvas');
        const ytCanvas = document.getElementById('ytCanvas');
        const playerStateOverlay = document.getElementById('playerStateOverlay');
        const playerSpinner = document.getElementById('playerSpinner');
        const playerStateMessage = document.getElementById('playerStateMessage');
        const playerRetryBtn = document.getElementById('playerRetryBtn');
        const channelsGridSystem = document.getElementById('channelsGridSystem');
        const searchInput = document.getElementById('searchChannels');
        const sectionTitleDisplay = document.getElementById('sectionTitleDisplay');
        const playerViewport = document.getElementById('playerViewport');
        const playerCurrentTitle = document.getElementById('playerCurrentTitle');

        // Control Buttons UI
        const btnPlayPause = document.getElementById('btnPlayPause');
        const btnMute = document.getElementById('btnMute');
        const volumeSlider = document.getElementById('volumeSlider');
        const btnRetryEngine = document.getElementById('btnRetryEngine');
        const btnTheater = document.getElementById('btnTheater');
        const btnPip = document.getElementById('btnPip');
        const btnFullscreen = document.getElementById('btnFullscreen');

        /**
         * Initialize Channel Registry Database Engine
         */
        function initRegistry() {
            const stored = localStorage.getItem(SYSTEM_CONFIG.storageKey);
            if (stored) {
                try {
                    channelRegistry = JSON.parse(stored);
                } catch(e) {
                    channelRegistry = [];
                }
            } else {
                channelRegistry = []; // STRICT REQUIREMENT: No prefilled template data
            }
        }

        function commitRegistry() {
            localStorage.setItem(SYSTEM_CONFIG.storageKey, JSON.stringify(channelRegistry));
            renderChannelGrid();
        }

        /**
         * Telegram Gateway Management Engine (Abstract APIs Ready for Webhook Hooking)
         */
        const TelegramAdminEngine = {
            addChannel(channelObj) {
                // validation schema requirement
                if(!channelObj.id || !channelObj.name || !channelObj.url) return false;
                if(channelRegistry.some(c => c.id === channelObj.id)) return false;
                
                channelRegistry.push({
                    id: channelObj.id,
                    name: channelObj.name,
                    url: channelObj.url,
                    category: channelObj.category || 'Custom',
                    thumbnail: channelObj.thumbnail || '',
                    enabled: true
                });
                commitRegistry();
                return true;
            },
            removeChannel(id) {
                channelRegistry = channelRegistry.filter(c => c.id !== id);
                commitRegistry();
                return true;
            },
            updateChannel(id, updatedFields) {
                let channel = channelRegistry.find(c => c.id === id);
                if (channel) {
                    Object.assign(channel, updatedFields);
                    commitRegistry();
                    return true;
                }
                return false;
            },
            toggleChannel(id) {
                let channel = channelRegistry.find(c => c.id === id);
                if (channel) {
                    channel.enabled = !channel.enabled;
                    commitRegistry();
                    return true;
                }
                return false;
            },
            reorderChannel(fromIndex, toIndex) {
                if (fromIndex >= 0 && fromIndex < channelRegistry.length && toIndex >= 0 && toIndex < channelRegistry.length) {
                    const elemental = channelRegistry.splice(fromIndex, 1)[0];
                    channelRegistry.splice(toIndex, 0, elemental);
                    commitRegistry();
                    return true;
                }
                return false;
            },
            updateCategory(id, category) {
                return this.updateChannel(id, { category });
            },
            updateThumbnail(id, thumbnail) {
                return this.updateChannel(id, { thumbnail });
            }
        };

        // Expose Telegram Engine to Global Context Safely for Headless/Bot Integration Injection
        window.MS_TelegramEngine = TelegramAdminEngine;

        /**
         * Unified Hybrid Streaming Core Engine Implementation
         */
        function detectStreamType(url) {
            if (!url) return 'unknown';
            if (url.includes('youtube.com/') || url.includes('youtu.be/') || /^[a-zA-Z0-9_-]{11}$/.test(url)) {
                return 'youtube';
            }
            return 'hls';
        }

        function extractYoutubeId(url) {
            if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function showPlayerState(msg, showSpinner = true, showRetry = false) {
            playerStateOverlay.style.display = 'flex';
            playerStateMessage.textContent = msg;
            playerSpinner.style.display = showSpinner ? 'block' : 'none';
            playerRetryBtn.style.display = showRetry ? 'block' : 'none';
        }

        function hidePlayerState() {
            playerStateOverlay.style.display = 'none';
        }

        function terminatePlayers() {
            // Teardown HLS Canvas Core
            if (hlsEngine) {
                hlsEngine.destroy();
                hlsEngine = null;
            }
            hlsCanvas.pause();
            hlsCanvas.src = "";
            hlsCanvas.load();
            hlsCanvas.style.display = 'none';

            // Teardown YouTube Canvas Area
            ytCanvas.style.display = 'none';
            try {
                if (ytPlayer && ytPlayer.destroy) {
                    ytPlayer.destroy();
                    ytPlayer = null;
                }
            } catch (e) { console.error(e); }
            ytCanvas.innerHTML = "";
        }

        function playChannel(channel) {
            if (!channel) return;
            activeChannel = channel;
            terminatePlayers();
            hidePlayerState();
            
            playerCurrentTitle.textContent = channel.name;
            addToRecents(channel.id);

            const streamType = detectStreamType(channel.url);

            if (streamType === 'youtube') {
                const ytId = extractYoutubeId(channel.url);
                if (!ytId) {
                    showPlayerState("Invalid YouTube Live Stream ID", false, false);
                    return;
                }
                loadYoutubeEngine(ytId);
            } else {
                loadHlsEngine(channel.url);
            }
        }

        function loadHlsEngine(url) {
            hlsCanvas.style.display = 'block';
            showPlayerState("Loading Secure Live Stream Audio/Video...");

            if (Hls.isSupported()) {
                hlsEngine = new Hls({
                    maxLiveSyncPlaybackRate: 1.5,
                    enableWorker: true
                });
                hlsEngine.loadSource(url);
                hlsEngine.attachMedia(hlsCanvas);
                
                hlsEngine.on(Hls.Events.MANIFEST_PARSED, () => {
                    hlsCanvas.play().then(hidePlayerState).catch(handlePlaybackBlocked);
                });

                hlsEngine.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                showPlayerState("Network Exception Encountered. Stream Down.", false, true);
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsEngine.recoverMediaError();
                                break;
                            default:
                                showPlayerState("Fatal Pipeline Error. Stream Down.", false, true);
                                break;
                        }
                    }
                });
            } else if (hlsCanvas.canPlayType('application/vnd.apple.mpegurl')) {
                // Native Safari engine fallback implementation
                hlsCanvas.src = url;
                hlsCanvas.addEventListener('loadedmetadata', () => {
                    hlsCanvas.play().then(hidePlayerState).catch(handlePlaybackBlocked);
                });
                hlsCanvas.addEventListener('error', () => {
                    showPlayerState("Playback Failure or Network Drop Detected.", false, true);
                });
            } else {
                showPlayerState("Your Modern Environment Lacks HLS Extensions.", false, false);
            }
        }

        function loadYoutubeEngine(id) {
            ytCanvas.style.display = 'block';
            showPlayerState("Connecting to YouTube Processing Core...");

            const initYt = () => {
                ytPlayer = new YT.Player('ytCanvas', {
                    videoId: id,
                    playerVars: {
                        autoplay: 1,
                        controls: 0,
                        disablekb: 1,
                        fs: 0,
                        modestbranding: 1,
                        rel: 0,
                        showinfo: 0,
                        iv_load_policy: 3
                    },
                    events: {
                        onReady: (e) => {
                            e.target.setVolume(parseInt(volumeSlider.value));
                            hidePlayerState();
                        },
                        onError: (e) => {
                            showPlayerState("YouTube Live Node Unreachable or Stream Offline.", false, true);
                        },
                        onStateChange: (e) => {
                            if(e.data === YT.PlayerState.BUFFERING) showPlayerState("Buffering Pipeline Broadcast...");
                            else if(e.data === YT.PlayerState.PLAYING) hidePlayerState();
                        }
                    }
                });
            };

            if (window.YT && window.YT.Player) {
                initYt();
            } else {
                // Engine loop waiting for script to load fully
                let attempts = 0;
                const checker = setInterval(() => {
                    attempts++;
                    if (window.YT && window.YT.Player) {
                        clearInterval(checker);
                        initYt();
                    }
                    if(attempts > 30) {
                        clearInterval(checker);
                        showPlayerState("YouTube Subsystem API Initialization Timeout.", false, true);
                    }
                }, 200);
            }
        }

        function handlePlaybackBlocked() {
            showPlayerState("Audio Interaction Required to Initialize Playback.", false, true);
            playerRetryBtn.textContent = "Unmute & Play";
        }

        // Core App Window Hook for YouTube Engine API Auto Detection
        window.onYouTubeIframeAPIReady = function() {
            ytApiReady = true;
        };

        /**
         * Channel UI Card Grid Renderer Pipeline
         */
        function renderChannelGrid() {
            channelsGridSystem.innerHTML = "";
            
            let filtered = channelRegistry.filter(c => c.enabled);

            // Filter context management routing
            if (currentFilter === 'favorites') {
                filtered = filtered.filter(c => favoriteRegistry.includes(c.id));
                sectionTitleDisplay.textContent = "Favorite Channels";
            } else if (currentFilter === 'recents') {
                filtered = recentRegistry.map(id => filtered.find(c => c.id === id)).filter(Boolean);
                sectionTitleDisplay.textContent = "Recently Watched";
            } else if (currentFilter !== 'all') {
                filtered = filtered.filter(c => c.category.toLowerCase() === currentFilter.toLowerCase());
                sectionTitleDisplay.textContent = `${currentFilter} Channels`;
            } else {
                sectionTitleDisplay.textContent = "All Live Operational Channels";
            }

            // Search execution filter logic
            if (searchQuery.trim() !== "") {
                filtered = filtered.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
                sectionTitleDisplay.textContent = `Search Results for: "${searchQuery}"`;
            }

            // Screen State Handling: Strict enforcement requirement
            if (filtered.length === 0) {
                channelsGridSystem.innerHTML = `
                    <div class="empty-registry-state">
                        <i class="fa-solid fa-tv"></i>
                        <h3>No Live Channels Available</h3>
                        <p>This dynamic pipeline is real-data driven. Add high-performance configurations via remote logic streams or terminal dashboard handlers.</p>
                    </div>
                `;
                return;
            }

            // Render operational matrix loops
            filtered.forEach(channel => {
                const isFav = favoriteRegistry.includes(channel.id);
                const isRecent = recentRegistry.includes(channel.id);
                
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.setAttribute('data-id', channel.id);

                const thumbSrc = channel.thumbnail ? channel.thumbnail : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" style="background:%23111;"><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="10" fill="%23444">STREAM MATRIX</text></svg>';

                card.innerHTML = `
                    <div class="card-thumb-wrapper">
                        <img class="card-thumb" src="${thumbSrc}" loading="lazy" alt="${channel.name} Display Graphic">
                        <div class="card-badge-live online">Live</div>
                        <button class="card-action-btn ${isFav ? 'is-favorite' : ''}" data-fav="${channel.id}" aria-label="Toggle favorite state button">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${channel.name}</div>
                        <div class="card-meta-row">
                            <span class="card-category">${channel.category}</span>
                            ${isRecent ? '<span class="recent-indicator"><i class="fa-solid fa-clock"></i> Recent</span>' : ''}
                        </div>
                    </div>
                `;

                // Navigation Handlers Interface binding
                card.addEventListener('click', (e) => {
                    if (e.target.closest('[data-fav]')) return; // skip logic path if icon targeted
                    playChannel(channel);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                card.addEventListener('keydown', (e) => {
                    if(e.key === 'Enter') {
                        playChannel(channel);
                    }
                });

                // Favorite control binding inside loop context
                const favBtn = card.querySelector('[data-fav]');
                favBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(channel.id);
                });

                channelsGridSystem.appendChild(card);
            });
        }

        /**
         * State Storage Interactions Framework
         */
        function toggleFavorite(id) {
            if (favoriteRegistry.includes(id)) {
                favoriteRegistry = favoriteRegistry.filter(fid => fid !== id);
            } else {
                favoriteRegistry.push(id);
            }
            localStorage.setItem(SYSTEM_CONFIG.favsKey, JSON.stringify(favoriteRegistry));
            renderChannelGrid();
        }

        function addToRecents(id) {
            recentRegistry = recentRegistry.filter(rid => rid !== id);
            recentRegistry.unshift(id);
            if (recentRegistry.length > 12) recentRegistry.pop(); // clamp to memory constraints limit
            localStorage.setItem(SYSTEM_CONFIG.recentsKey, JSON.stringify(recentRegistry));
        }

        /**
         * System Custom Controllers & Native UI Interaction Shell Logic
         */
        function setupUXControllers() {
            // Search Input Logic Frame Engine
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderChannelGrid();
            });

            // Navigation Tab Router Events
            const binder = (elements, activeClass) => {
                elements.forEach(item => {
                    item.addEventListener('click', () => {
                        elements.forEach(el => el.classList.remove(activeClass));
                        item.classList.add(activeClass);
                        
                        if(item.dataset.target) {
                            currentFilter = item.dataset.target;
                        } else if(item.dataset.category) {
                            currentFilter = item.dataset.category;
                        }
                        renderChannelGrid();
                    });
                });
            };

            binder(document.querySelectorAll('.sidebar .nav-item'), 'active');
            binder(document.querySelectorAll('.mobile-nav-bar .mobile-nav-item'), 'active');

            // Native Media Interface UI Buttons Hook Layer
            btnPlayPause.addEventListener('click', () => {
                if (activeChannel) {
                    const type = detectStreamType(activeChannel.url);
                    if (type === 'youtube' && ytPlayer) {
                        const state = ytPlayer.getPlayerState();
                        if(state === YT.PlayerState.PLAYING) {
                            ytPlayer.pauseVideo();
                            btnPlayPause.innerHTML = '<i class="fa-solid fa-play"></i>';
                        } else {
                            ytPlayer.playVideo();
                            btnPlayPause.innerHTML = '<i class="fa-solid fa-pause"></i>';
                        }
                    } else if (type === 'hls' && hlsCanvas) {
                        if (hlsCanvas.paused) {
                            hlsCanvas.play();
                            btnPlayPause.innerHTML = '<i class="fa-solid fa-pause"></i>';
                        } else {
                            hlsCanvas.pause();
                            btnPlayPause.innerHTML = '<i class="fa-solid fa-play"></i>';
                        }
                    }
                }
            });

            btnMute.addEventListener('click', () => {
                if (activeChannel) {
                    const type = detectStreamType(activeChannel.url);
                    if (type === 'youtube' && ytPlayer) {
                        if(ytPlayer.isMuted()) {
                            ytPlayer.unMute();
                            btnMute.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                        } else {
                            ytPlayer.mute();
                            btnMute.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                        }
                    } else if (type === 'hls' && hlsCanvas) {
                        hlsCanvas.muted = !hlsCanvas.muted;
                        btnMute.innerHTML = hlsCanvas.muted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
                    }
                }
            });

            volumeSlider.addEventListener('input', (e) => {
                const vol = e.target.value;
                if (activeChannel) {
                    const type = detectStreamType(activeChannel.url);
                    if (type === 'youtube' && ytPlayer) ytPlayer.setVolume(vol);
                    else if (type === 'hls' && hlsCanvas) hlsCanvas.volume = vol / 100;
                }
            });

            btnRetryEngine.addEventListener('click', () => {
                if(activeChannel) playChannel(activeChannel);
            });
            
            playerRetryBtn.addEventListener('click', () => {
                if(activeChannel) playChannel(activeChannel);
            });

            btnTheater.addEventListener('click', () => {
                playerViewport.classList.toggle('theater');
            });

            btnPip.addEventListener('click', async () => {
                try {
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                    } else if (hlsCanvas.style.display !== 'none') {
                        await hlsCanvas.requestPictureInPicture();
                    }
                } catch (e) { console.error("PiP Exception Context Triggered", e); }
            });

            btnFullscreen.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    playerViewport.requestFullscreen().catch(err => console.error(err));
                } else {
                    document.exitFullscreen();
                }
            });

            // Mobile specific layout helpers
            const mobileSearchTrigger = document.getElementById('mobileSearchTrigger');
            if(mobileSearchTrigger) {
                mobileSearchTrigger.addEventListener('click', () => {
                    searchInput.focus();
                    window.scrollTo({top: 0, behavior: 'smooth'});
                });
            }

            // Global Security Architecture Restrictions
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.keyCode === 123) return false; // Block F12 Inspect Element Engine Shortcut
                if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) return false;
                if (e.ctrlKey && e.keyCode === 85) return false; // Block Source view routing injection
            });
        }

        /**
         * Entry Point Application Bootstrapper Core Execution Lifecycle
         */
        document.addEventListener("DOMContentLoaded", () => {
            initRegistry();
            setupUXControllers();
            renderChannelGrid();

            // Handle internal state setup for auto play sequence configuration if real-data elements exist
            if (channelRegistry.length > 0) {
                const operationalElements = channelRegistry.filter(c => c.enabled);
                if (operationalElements.length > 0) {
                    playChannel(operationalElements[0]);
                }
            } else {
                showPlayerState("No Stream Configured. Operational Registry Pipeline Empty.", false, false);
            }
        });
    </script>
</body>
</html>
